<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Magic - Visual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app {
            width: 100vw;
            height: 100vh;
            display: none;
        }

        #lock-screen {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #e6e6e6;
        }

        .lock-icon {
            font-size: 6rem;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .lock-text {
            font-size: 1.4rem;
            color: #a0a0a0;
            margin-bottom: 40px;
            text-align: center;
        }

        .admin-link {
            display: inline-block;
            padding: 14px 36px;
            background: rgba(76, 201, 240, 0.15);
            color: #4cc9f0;
            border: 1px solid #4cc9f0;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .admin-link:hover {
            background: rgba(76, 201, 240, 0.3);
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }

        #connected-screen {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #4a4a5a;
        }

        .connected-text {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: subtle-pulse 3s ease-in-out infinite;
        }

        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        #exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #a0a0a0;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s ease, color 0.2s ease;
            z-index: 100;
        }

        #exit-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        #exit-btn span {
            line-height: 1;
            margin-top: -2px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="lock-screen">
        <div class="lock-icon">🔒</div>
        <div class="lock-text">You'll need to connect with /admin.</div>
        <a href="../admin/" class="admin-link">Go to /admin</a>
    </div>

    <div id="connected-screen">
        <div class="connected-text">Connected</div>
    </div>

    <button id="exit-btn" aria-label="Return to player">
        <span>×</span>
    </button>

    <script>
        (function() {
            const exitBtn = document.getElementById('exit-btn');
            const lockScreen = document.getElementById('lock-screen');
            const connectedScreen = document.getElementById('connected-screen');
            const app = document.getElementById('app');

            exitBtn.addEventListener('click', function() {
                window.location.href = '../player/';
            });

            function hasActiveGameState() {
                const keys = Object.keys(localStorage);
                for (let i = 0; i < keys.length; i++) {
                    const key = keys[i];
                    if (key === 'escape_room_game_state' || key.startsWith('escape_room_game_state_')) {
                        try {
                            const data = localStorage.getItem(key);
                            if (data) {
                                const state = JSON.parse(data);
                                if (state && state.game_active === true) return true;
                            }
                        } catch (e) { continue; }
                    }
                }
                return false;
            }

            function init() {
                if (hasActiveGameState()) {
                    app.style.display = 'none';
                    lockScreen.style.display = 'none';
                    connectedScreen.style.display = 'flex';
                    exitBtn.style.display = 'flex';
                } else {
                    app.style.display = 'none';
                    lockScreen.style.display = 'flex';
                    connectedScreen.style.display = 'none';
                    exitBtn.style.display = 'flex';
                }
            }

            init();
        })();
    </script>
</body>
</html>
