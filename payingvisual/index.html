<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Magic - Visual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(ellipse at center, #111118 0%, #050508 70%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #lock-screen {
            width: 100vw; height: 100vh; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #111118 0%, #050508 70%);
            color: #e6e6e6;
        }
        .lock-icon { font-size: 7rem; margin-bottom: 34px; filter: drop-shadow(0 0 40px rgba(255,255,255,0.08)); }
        .lock-text { font-size: 1.3rem; color: #666; margin-bottom: 44px; text-align: center; letter-spacing: 1px; }
        .admin-link {
            display: inline-block; padding: 14px 40px;
            background: transparent; color: #888;
            border: 1px solid rgba(255,255,255,0.12); border-radius: 100px;
            text-decoration: none; font-size: 0.9rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .admin-link:hover { border-color: rgba(255,255,255,0.4); color: #ccc; }

        #connected-screen {
            width: 100vw; height: 100vh; display: none;
            flex-direction: row; align-items: center; justify-content: center;
            gap: 0; padding: 80px 60px;
        }
        .pricing-card {
            text-align: center; flex: 1; max-width: 380px; padding: 0 40px;
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: relative;
        }
        .pricing-card.visible { opacity: 1; transform: translateY(0); }
        .pricing-card + .pricing-card { border-left: 1px solid rgba(255,255,255,0.06); }
        .pricing-card:nth-child(2) { transition-delay: 0.15s; }
        .pricing-card:nth-child(3) { transition-delay: 0.3s; }

        .pricing-title {
            font-size: 0.85rem; color: #d4a55a;
            font-family: Georgia, serif; letter-spacing: 4px; text-transform: uppercase;
            margin-bottom: 28px;
        }
        .pricing-price {
            font-size: 6.5rem; font-weight: 200; color: #e8e8e8;
            line-height: 1; margin-bottom: 28px; letter-spacing: -3px;
        }
        .pricing-price span {
            font-size: 2rem; font-weight: 300; vertical-align: super;
            margin-right: 2px; color: #d4a55a;
        }
        .pricing-desc {
            font-size: 0.9rem; color: #555; line-height: 1.7; max-width: 260px;
            margin: 0 auto;
        }
        .pricing-divider {
            width: 40px; height: 1px; background: rgba(212,165,90,0.2);
            margin: 0 auto 28px;
        }

        #exit-btn {
            position: fixed; top: 24px; right: 24px; width: 44px; height: 44px;
            border-radius: 50%; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1); color: #555;
            font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; z-index: 100;
        }
        #exit-btn:hover { border-color: rgba(255,255,255,0.3); color: #aaa; background: rgba(255,255,255,0.06); }

        @media (max-width: 768px) {
            #connected-screen { flex-direction: column; gap: 50px; padding: 60px 30px; }
            .pricing-card + .pricing-card { border-left: none; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 40px; }
            .pricing-card { padding: 0 20px; }
            .pricing-price { font-size: 4.5rem; }
        }
    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="lock-icon">🔒</div>
        <div class="lock-text">You'll need to connect with /admin.</div>
        <a href="../admin/" class="admin-link">Go to /admin</a>
    </div>

    <div id="connected-screen">
        <div class="pricing-card" id="card1">
            <div class="pricing-title"></div>
            <div class="pricing-price"><span>$</span></div>
            <div class="pricing-divider"></div>
            <div class="pricing-desc"></div>
        </div>
        <div class="pricing-card" id="card2">
            <div class="pricing-title"></div>
            <div class="pricing-price"><span>$</span></div>
            <div class="pricing-divider"></div>
            <div class="pricing-desc"></div>
        </div>
        <div class="pricing-card" id="card3">
            <div class="pricing-title"></div>
            <div class="pricing-price"><span>$</span></div>
            <div class="pricing-divider"></div>
            <div class="pricing-desc"></div>
        </div>
    </div>

    <button id="exit-btn" aria-label="Return to player">×</button>

    <script>
        (function() {
            var exitBtn = document.getElementById('exit-btn');
            var lockScreen = document.getElementById('lock-screen');
            var connectedScreen = document.getElementById('connected-screen');

            exitBtn.addEventListener('click', function() {
                window.location.href = '../player/';
            });

            function hasActiveGameState() {
                var keys = Object.keys(localStorage);
                for (var i = 0; i < keys.length; i++) {
                    var key = keys[i];
                    if (key === 'escape_room_game_state' || key.indexOf('escape_room_game_state_') === 0) {
                        try {
                            var state = JSON.parse(localStorage.getItem(key));
                            if (state && state.game_active === true) return true;
                        } catch (e) { continue; }
                    }
                }
                for (var j = 0; j < keys.length; j++) {
                    try {
                        var s = JSON.parse(localStorage.getItem(keys[j]));
                        if (s && s.game_active === true && s.time_remaining !== undefined) return true;
                    } catch (e) { continue; }
                }
                return false;
            }

            function renderPricing() {
                try {
                    var data = JSON.parse(localStorage.getItem('escape_room_pricing'));
                    if (!data) return;
                    ['box1','box2','box3'].forEach(function(box, i) {
                        var card = document.getElementById('card' + (i + 1));
                        if (!card || !data[box]) return;
                        var d = data[box];
                        card.querySelector('.pricing-title').textContent = d.title || '';
                        card.querySelector('.pricing-price').innerHTML = '<span>$</span>' + (d.price || '');
                        card.querySelector('.pricing-desc').textContent = d.description || '';
                    });
                } catch (e) {}
            }

            function isConnected() {
                if (hasActiveGameState()) return true;
                try {
                    var login = JSON.parse(localStorage.getItem('escape_room_admin_login'));
                    if (login && login.key && login.lastActive) {
                        var fiveMin = 5 * 60 * 1000;
                        if (Date.now() - login.lastActive < fiveMin) return true;
                    }
                } catch (e) {}
                return false;
            }

            function showConnected() {
                lockScreen.style.display = 'none';
                connectedScreen.style.display = 'flex';
                exitBtn.style.display = 'flex';
                renderPricing();
                setTimeout(function() {
                    document.querySelectorAll('.pricing-card').forEach(function(c) {
                        c.classList.add('visible');
                    });
                }, 100);
            }

            function showLocked() {
                connectedScreen.style.display = 'none';
                lockScreen.style.display = 'flex';
                exitBtn.style.display = 'flex';
            }

            function init() {
                if (isConnected()) showConnected();
                else showLocked();
            }

            init();
            window.addEventListener('storage', function(e) {
                if (e.key && (e.key === 'escape_room_game_state' || e.key.startsWith('escape_room_game_state_'))) {
                    if (hasActiveGameState()) showConnected();
                    else showLocked();
                }
            });
        })();
    </script>
</body>
</html>
