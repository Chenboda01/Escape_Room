<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Magic - Visual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app {
            width: 100vw;
            height: 100vh;
            display: none;
        }

        #lock-screen {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #e6e6e6;
        }

        .lock-icon {
            font-size: 6rem;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .lock-text {
            font-size: 1.4rem;
            color: #a0a0a0;
            margin-bottom: 40px;
            text-align: center;
        }

        .admin-link {
            display: inline-block;
            padding: 14px 36px;
            background: rgba(76, 201, 240, 0.15);
            color: #4cc9f0;
            border: 1px solid #4cc9f0;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .admin-link:hover {
            background: rgba(76, 201, 240, 0.3);
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }

        #connected-screen {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 60px;
            background: #0a0a0a;
            padding: 60px;
        }

        .pricing-card {
            text-align: center;
            max-width: 320px;
            flex: 1;
        }

        .pricing-title {
            font-size: 1.6rem;
            color: #d4a55a;
            font-family: Georgia, serif;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .pricing-price {
            font-size: 5rem;
            font-weight: 300;
            color: #e6e6e6;
            line-height: 1;
            margin-bottom: 16px;
        }

        .pricing-price span {
            font-size: 2rem;
            vertical-align: super;
            margin-right: 4px;
        }

        .pricing-desc {
            font-size: 0.95rem;
            color: #707070;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            #connected-screen {
                flex-direction: column;
                gap: 40px;
                padding: 40px 20px;
            }
            .pricing-title { font-size: 1.3rem; }
            .pricing-price { font-size: 3.5rem; }
        }

        #exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #a0a0a0;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s ease, color 0.2s ease;
            z-index: 100;
        }

        #exit-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        #exit-btn span {
            line-height: 1;
            margin-top: -2px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="lock-screen">
        <div class="lock-icon">🔒</div>
        <div class="lock-text">You'll need to connect with /admin.</div>
        <a href="../admin/" class="admin-link">Go to /admin</a>
    </div>

    <div id="connected-screen">
        <div class="pricing-card" id="card1">
            <div class="pricing-title"></div>
            <div class="pricing-price"><span>$</span></div>
            <div class="pricing-desc"></div>
        </div>
        <div class="pricing-card" id="card2">
            <div class="pricing-title"></div>
            <div class="pricing-price"><span>$</span></div>
            <div class="pricing-desc"></div>
        </div>
        <div class="pricing-card" id="card3">
            <div class="pricing-title"></div>
            <div class="pricing-price"><span>$</span></div>
            <div class="pricing-desc"></div>
        </div>
    </div>

    <button id="exit-btn" aria-label="Return to player">
        <span>×</span>
    </button>

    <script>
        (function() {
            const exitBtn = document.getElementById('exit-btn');
            const lockScreen = document.getElementById('lock-screen');
            const connectedScreen = document.getElementById('connected-screen');
            const app = document.getElementById('app');

            exitBtn.addEventListener('click', function() {
                window.location.href = '../player/';
            });

            function hasActiveGameState() {
                const keys = Object.keys(localStorage);
                for (let i = 0; i < keys.length; i++) {
                    const key = keys[i];
                    if (key === 'escape_room_game_state' || key.startsWith('escape_room_game_state_')) {
                        try {
                            const data = localStorage.getItem(key);
                            if (data) {
                                const state = JSON.parse(data);
                                if (state && state.game_active === true) return true;
                            }
                        } catch (e) { continue; }
                    }
                }
                return false;
            }

            function isConnected() {
                if (hasActiveGameState()) return true;
                return false;
            }
                } catch (e) {}
                return false;
            }

            function renderPricing() {
                try {
                    var data = JSON.parse(localStorage.getItem('escape_room_pricing'));
                    if (!data) return;
                    ['box1','box2','box3'].forEach(function(box, i) {
                        var card = document.getElementById('card' + (i + 1));
                        if (!card || !data[box]) return;
                        var d = data[box];
                        card.querySelector('.pricing-title').textContent = d.title || '';
                        card.querySelector('.pricing-price').innerHTML = '<span>$</span>' + (d.price || '');
                        card.querySelector('.pricing-desc').textContent = d.description || '';
                    });
                } catch (e) {}
            }

            function init() {
                if (isConnected()) {
                    app.style.display = 'none';
                    lockScreen.style.display = 'none';
                    connectedScreen.style.display = 'flex';
                    exitBtn.style.display = 'flex';
                    renderPricing();
                } else {
                    app.style.display = 'none';
                    lockScreen.style.display = 'flex';
                    connectedScreen.style.display = 'none';
                    exitBtn.style.display = 'flex';
                }
            }

            init();
        })();
    </script>
</body>
</html>
